name: Update Matches Cron

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  update-matches:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Update Matches API
        run: |
          curl -X GET "https://${{ secrets.VERCEL_DOMAIN }}/api/cron/update-matches" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
